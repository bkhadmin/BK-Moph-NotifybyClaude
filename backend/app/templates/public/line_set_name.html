<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>ระบุชื่อ-นามสกุล</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{background:#fff;border-radius:20px;padding:28px 24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(15,23,42,.25)}
    .header{text-align:center;margin-bottom:22px}
    .header-icon{width:56px;height:56px;border-radius:50%;background:#f0fdf4;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px}
    .header h1{font-size:1.1rem;font-weight:800;color:#0f172a}
    .header p{font-size:.84rem;color:#64748b;margin-top:4px;line-height:1.5}
    .line-badge{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:.84rem;color:#166534;font-weight:600;display:flex;align-items:center;gap:8px}
    .form-label{display:block;font-size:.82rem;font-weight:700;color:#374151;margin-bottom:6px}
    .form-input{width:100%;padding:12px 14px;border:1.5px solid #cbd5e1;border-radius:10px;font-size:.9rem;color:#0f172a;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    .btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;border:0;margin-top:12px;text-align:center}
    .btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
    .note{font-size:.78rem;color:#94a3b8;text-align:center;margin-top:12px;line-height:1.5}
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-icon">👤</div>
    <h1>ระบุชื่อ-นามสกุล</h1>
    <p>ระบุชื่อจริงของคุณเพื่อใช้ในการรับเคส<br>ระบบจะจำไว้สำหรับครั้งถัดไป</p>
  </div>

  {% if display_name %}
  <div class="line-badge">
    <span>✅</span>
    <span>LINE: <strong>{{ display_name }}</strong></span>
  </div>
  {% endif %}

  <form method="post" action="/line/set-name">
    <input type="hidden" name="next" value="{{ next }}">
    <div>
      <label class="form-label">ชื่อ-นามสกุล (ภาษาไทย)</label>
      <input class="form-input" name="real_name" value="{{ real_name or '' }}"
             placeholder="เช่น นายสมชาย ใจดี" autocomplete="name" required autofocus>
    </div>
    <button class="btn btn-primary" type="submit">✅ บันทึกและดำเนินการต่อ</button>
  </form>
  <div class="note">ชื่อนี้จะแสดงในระบบเมื่อคุณรับเคส<br>สามารถเปลี่ยนได้ในภายหลัง</div>
</div>
</body>
</html>
