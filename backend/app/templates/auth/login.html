{% extends "base.html" %}
{% block guest_body %}
<div class="guest-wrap">
  <div class="login-card">
    <h1 class="page-title">BK-Moph Notify</h1>
    <p class="muted mt-3">เข้าสู่ระบบผู้ดูแลและผู้ใช้งาน</p>
    {% if error %}<div class="alert error mt-4">{{ error }}</div>{% endif %}
    <form method="post" action="/login" class="mt-6 stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input name="username" placeholder="Username" class="input">
      <input type="password" name="password" placeholder="Password" class="input">
      <button type="submit" class="btn">Login</button>
    </form>
    <div class="mt-4">
      <a href="/auth/provider/login">Login with Provider ID</a>
      {% if not provider_login_enabled %}
      <div class="muted mt-3">Provider login scaffold mode</div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
