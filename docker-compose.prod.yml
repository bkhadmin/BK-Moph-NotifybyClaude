services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    env_file: [.env]
    environment:
      TZ: Asia/Bangkok
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    environment:
      TZ: Asia/Bangkok
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  app:
    build: ./backend
    env_file: [.env]
    environment:
      TZ: Asia/Bangkok
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      CLAIM_SIGNING_SECRET: ${CLAIM_SIGNING_SECRET:-}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-127.0.0.1,localhost,app,app:8000,nginx,bk_app,bkalert.bkhospital.go.th}
    command: >
      sh -c "python scripts/bootstrap.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build: ./backend
    env_file: [.env]
    environment:
      TZ: Asia/Bangkok
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      CLAIM_SIGNING_SECRET: ${CLAIM_SIGNING_SECRET:-}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-127.0.0.1,localhost,app,app:8000,nginx,bk_app,bkalert.bkhospital.go.th}
    command: python -m app.worker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_uploads:/app/storage/uploads

  beat:
    build: ./backend
    env_file: [.env]
    environment:
      TZ: Asia/Bangkok
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      CLAIM_SIGNING_SECRET: ${CLAIM_SIGNING_SECRET:-}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-127.0.0.1,localhost,app,app:8000,nginx,bk_app,bkalert.bkhospital.go.th}
    command: python -m app.beat
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: ./backend
    env_file: [.env]
    environment:
      TZ: Asia/Bangkok
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      CLAIM_SIGNING_SECRET: ${CLAIM_SIGNING_SECRET:-}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-127.0.0.1,localhost,app,app:8000,nginx,bk_app,bkalert.bkhospital.go.th}
    command: python -m app.worker_scheduler
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_uploads:/app/storage/uploads

  nginx:
    image: nginx:1.27-alpine
    environment:
      TZ: Asia/Bangkok
    depends_on:
      app:
        condition: service_started
    ports:
      - "${NGINX_PORT:-8012}:80"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/app/static:/app/static:ro
      - app_uploads:/app/storage/uploads:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bk-cloudflared
    restart: always
    depends_on:
      nginx:
        condition: service_started
    env_file: [.env]
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}

  adminer:
    image: adminer:4
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      TZ: Asia/Bangkok
    ports:
      - "${ADMINER_PORT:-8081}:8080"

volumes:
  mysql_data:
  app_uploads:
