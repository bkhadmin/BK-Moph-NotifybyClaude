limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
upstream bk_app { server app:8000; }

# ── Internal (LAN only) ──────────────────────────────────────
server {
    listen 80;
    server_name _;
    location = /health { proxy_pass http://bk_app/health; access_log off; }
    location /static/uploads/ { proxy_pass http://bk_app; proxy_set_header Host $host; }
    location /static/ { alias /app/static/; }
    location /login {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://bk_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass http://bk_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── External / Cloudflare Tunnel (port 8080) ─────────────────
# เปิดเฉพาะ /alerts/claim เท่านั้น path อื่น return 404
server {
    listen 8080;
    server_name _;
    location = /health { proxy_pass http://bk_app/health; access_log off; }
    location /alerts/claim {
        proxy_pass http://bk_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /static/uploads/ {
        proxy_pass http://bk_app;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location / {
        return 404;
    }
}
